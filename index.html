          <span className="font-rounded text-bluegrey font-bold text-center leading-snug text-sm sm:text-base mt-2">
            {title}
          </span>
        </div>
      );
    };

    window.KanjiApp = ({ onBack }) => {
      const [gameState, setGameState] = useState('TITLE'); 
      const [selectedGrade, setSelectedGrade] = useState(1);
      const [selectedUnits, setSelectedUnits] = useState([]);
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [userInput, setUserInput] = useState('');
      const [feedback, setFeedback] = useState(null);
      const [isDrawing, setIsDrawing] = useState(false);
      
      const [penSize, setPenSize] = useState(35);
      const [difficulty, setDifficulty] = useState(0.60);
      const [errorMessage, setErrorMessage] = useState('');
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      
      // ★ミスしたかを記録するステート
      const [hasMistaked, setHasMistaked] = useState(false);
      
      const bgCanvasRef = useRef(null);
      const drawCanvasRef = useRef(null);
      const inputRef = useRef(null);

      const pathsRef = useRef([]);
      const currentPathRef = useRef([]);

      // ★スコアをローカルストレージに保存する関数
      const addScoreToLocal = () => {
        const currentScore = parseInt(localStorage.getItem('gogo_drill_score') || '0', 10);
        localStorage.setItem('gogo_drill_score', currentScore + 1);
      };

      const startGame = (mode) => {
        let combinedQuestions = [];
        selectedUnits.forEach(unit => {
          const filtered = KANJI_DATA[selectedGrade][unit] || [];
          combinedQuestions = [...combinedQuestions, ...filtered];
        });
        
        if(combinedQuestions.length === 0) {
            alert('このたんげんの もんだいは まだ ありません！\n(先生にデータを追加してもらってね)');
            return;
        }

        const shuffled = combinedQuestions.sort(() => 0.5 - Math.random());
        
        setQuestions(shuffled);
        setCurrentIndex(0);
        setScore(0);
        setHasMistaked(false);
        setGameState(mode);
        setFeedback(null);
        setErrorMessage('');
        setUserInput('');
        pathsRef.current = [];
        currentPathRef.current = [];
      };

      const goToNextQuestion = (nextState) => {
        setFeedback(null);
        setErrorMessage('');
        setUserInput('');
        pathsRef.current = [];
        currentPathRef.current = [];
        setHasMistaked(false);
        
        if (currentIndex + 1 < questions.length) {
          setCurrentIndex(i => i + 1);
          setGameState(nextState);
          if (nextState === 'READ' && inputRef.current) {
            setTimeout(() => inputRef.current.focus(), 50);
          }
        } else {
          setGameState('RESULT');
        }
      };

      const selectGrade = (grade) => {
        setSelectedGrade(grade);
        setSelectedUnits([]);
        setGameState('UNIT_SELECT');
      };

      const toggleUnit = (unit) => {
        setSelectedUnits(prev => 
          prev.includes(unit) 
            ? prev.filter(u => u !== unit) 
            : [...prev, unit]
        );
      };

      const decideUnits = () => {
        if (selectedUnits.length === 0) {
          alert('たんげんを 1つ以上 えらんでね！');
          return;
        }
        setGameState('INSERTING');
        setTimeout(() => {
          setGameState('MENU');
        }, 1200);
      };

      const renderQuestionText = (mode) => {
        const q = questions[currentIndex];
        if (!q) return null;
        const parts = q.s.split(q.k);
        return (
          <div className="w-full text-center bg-white/80 p-3 sm:p-5 rounded-lg border border-gray-200 shadow-sm my-1 sm:my-2 relative shrink-0">
            <p className="text-2xl sm:text-4xl font-kyokasho text-bluegrey leading-normal tracking-wide">
              {parts.map((part, index) => (
                <React.Fragment key={index}>
                  {part}
                  {index < parts.length - 1 && (
                    mode === 'READ' ? (
                      <span className="border-b-4 border-terracotta pb-1 mx-1 text-terracotta">
                        {q.k}
                      </span>
                    ) : (
                      <span className="border-b-4 border-sage pb-1 mx-1 text-sage">
                        {q.y}
                      </span>
                    )
                  )}
                </React.Fragment>
              ))}
            </p>
            {feedback && gameState === 'READ' && (
              <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-50">
                <span className={`text-[7rem] sm:text-[9rem] drop-shadow-md opacity-90 leading-none ${feedback === '⭕️' ? 'text-sage' : 'text-terracotta'}`}>
                  {feedback}
                </span>
                {errorMessage && (
                  <div className="mt-2 bg-white/95 px-4 py-2 rounded-xl border-4 border-terracotta text-terracotta font-rounded text-sm sm:text-base text-center whitespace-pre-wrap shadow-lg">
                    {errorMessage}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      };

      const checkReading = () => {
        if(!userInput) return;
        const currentQ = questions[currentIndex];
        const normalize = (str) => str.replace(/[\u30a1-\u30f6]/g, match => String.fromCharCode(match.charCodeAt(0) - 0x60));
        const isCorrect = normalize(userInput) === normalize(currentQ.y);
        
        if (isCorrect) {
          setFeedback('⭕️');
          if (!hasMistaked) {
            setScore(s => s + 1);
            addScoreToLocal(); // ★一発正解時のみ全体スコア加算
          }
          setTimeout(() => {
            goToNextQuestion('READ');
          }, 1500);
        } else {
          setFeedback('❌');
          setHasMistaked(true); // ★ミス記録
          setErrorMessage(`せいかいは「${currentQ.y}」だよ！`);
          setTimeout(() => {
            setFeedback(null);
            setErrorMessage('');
            setUserInput('');
          }, 2500);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && feedback === null && !e.nativeEvent.isComposing) {
          checkReading();
        }
      };

      useEffect(() => {
        if (gameState === 'READ' && inputRef.current && feedback === null) {
          inputRef.current.focus();
        }
      }, [gameState, currentIndex, feedback]);

      const CANVAS_SIZE = 400;

      useEffect(() => {
        if ((gameState === 'WRITE' || gameState === 'PRACTICE') && drawCanvasRef.current && bgCanvasRef.current && questions[currentIndex]) {
          clearCanvas(gameState);
        }
      }, [gameState, currentIndex, questions]);

      const clearCanvas = (currentState) => {
        pathsRef.current = [];
        currentPathRef.current = [];
        
        const drawCanvas = drawCanvasRef.current;
        const drawCtx = drawCanvas.getContext('2d');
        drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        
        const bgCanvas = bgCanvasRef.current;
        const bgCtx = bgCanvas.getContext('2d', { willReadFrequently: true });
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        
        bgCtx.fillStyle = '#ffffff';
        bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

        bgCtx.save();
        bgCtx.strokeStyle = '#81B29A'; 
        bgCtx.globalAlpha = 0.5;
        bgCtx.lineWidth = 2;
        bgCtx.setLineDash([8, 8]);
        bgCtx.beginPath();
        bgCtx.moveTo(bgCanvas.width / 2, 0);
        bgCtx.lineTo(bgCanvas.width / 2, bgCanvas.height);
        bgCtx.moveTo(0, bgCanvas.height / 2);
        bgCtx.lineTo(bgCanvas.width, bgCanvas.height / 2);
        bgCtx.stroke();
        bgCtx.restore();

        if (currentState === 'PRACTICE') {
          bgCtx.font = `340px "UD Digi Kyokasho N-B", "UD デジタル 教科書体 N-B", "Klee One", serif`;
          bgCtx.textAlign = 'center';
          bgCtx.textBaseline = 'middle';
          bgCtx.fillStyle = 'rgba(61, 64, 91, 0.1)'; 
          bgCtx.fillText(questions[currentIndex].k, bgCanvas.width / 2, bgCanvas.height / 2);
        }
      };

      const getCoordinates = (e) => {
        const canvas = drawCanvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      };

      const startDrawing = (e) => {
        setIsDrawing(true);
        const { x, y } = getCoordinates(e);
        currentPathRef.current = [{ x, y }];
        
        const ctx = drawCanvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y + 0.1); 
        ctx.lineWidth = penSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#3D405B';
        ctx.stroke();
      };

      const draw = (e) => {
        if (!isDrawing) return;
        const { x, y } = getCoordinates(e);
        currentPathRef.current.push({ x, y });
        
        const ctx = drawCanvasRef.current.getContext('2d');
        ctx.lineTo(x, y);
        ctx.lineWidth = penSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#3D405B';
        ctx.stroke();
      };

      const stopDrawing = () => {
        if (!isDrawing) return;
        setIsDrawing(false);
        if (currentPathRef.current.length > 0) {
          pathsRef.current.push([...currentPathRef.current]);
          currentPathRef.current = [];
        }
      };

      const checkWriting = () => {
        const width = CANVAS_SIZE;
        const height = CANVAS_SIZE;

        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        let totalPoints = 0;
        const halfPen = penSize / 2;

        pathsRef.current.forEach(path => {
          path.forEach(pt => {
            if (pt.x - halfPen < minX) minX = pt.x - halfPen;
            if (pt.x + halfPen > maxX) maxX = pt.x + halfPen;
            if (pt.y - halfPen < minY) minY = pt.y - halfPen;
            if (pt.y + halfPen > maxY) maxY = pt.y + halfPen;
            totalPoints++;
          });
        });

        if (totalPoints < 2) {
          setFeedback('❌');
          setErrorMessage('かいていないよ！');
          setTimeout(() => {
            setFeedback(null);
            setErrorMessage('');
            setGameState('PRACTICE');
          }, 2500);
          return;
        }

        const userW = maxX - minX;
        const userH = maxY - minY;
        const userCx = minX + userW / 2;
        const userCy = minY + userH / 2;

        const TARGET_SIZE = 340; 
        const effectiveW = Math.max(userW, 10); 
        const effectiveH = Math.max(userH, 10);
        let scale = TARGET_SIZE / Math.max(effectiveW, effectiveH);
        if (scale > 10) scale = 1;

        const normalizedPaths = pathsRef.current.map(path => {
          return path.map(pt => {
            return {
              x: (pt.x - userCx) * scale + (width / 2),
              y: (pt.y - userCy) * scale + (height / 2)
            };
          });
        });

        const targetCanvas = document.createElement('canvas');
        targetCanvas.width = width;
        targetCanvas.height = height;
        const targetCtx = targetCanvas.getContext('2d', { willReadFrequently: true });
        
        targetCtx.font = `340px "UD Digi Kyokasho N-B", "UD デジタル 教科書体 N-B", "Klee One", serif`;
        targetCtx.textAlign = 'center';
        targetCtx.textBaseline = 'middle';
        targetCtx.fillStyle = '#FF0000';
        targetCtx.fillText(questions[currentIndex].k, width / 2, height / 2);
        
        targetCtx.lineWidth = 15;
        targetCtx.strokeStyle = '#FF0000';
        targetCtx.strokeText(questions[currentIndex].k, width / 2, height / 2);

        const targetData = targetCtx.getImageData(0, 0, width, height).data;

        const userCanvas = document.createElement('canvas');
        userCanvas.width = width;
        userCanvas.height = height;
        const userCtx = userCanvas.getContext('2d', { willReadFrequently: true });
        
        userCtx.lineWidth = 90; 
        userCtx.lineCap = 'round';
        userCtx.lineJoin = 'round';
        userCtx.strokeStyle = '#000000';

        normalizedPaths.forEach(path => {
          if (path.length === 0) return;
          userCtx.beginPath();
          userCtx.moveTo(path[0].x, path[0].y);
          if (path.length === 1) {
            userCtx.lineTo(path[0].x, path[0].y + 0.1);
          } else {
            for (let i = 1; i < path.length; i++) {
              userCtx.lineTo(path[i].x, path[i].y);
            }
          }
          userCtx.stroke();
        });

        const userData = userCtx.getImageData(0, 0, width, height).data;

        let targetPixelCount = 0;
        let userPixelCount = 0;
        let coveredPixelCount = 0;
        const step = 4;

        for (let y = 0; y < height; y += step) {
          for (let x = 0; x < width; x += step) {
            const i = (y * width + x) * 4;
            const isTarget = targetData[i + 3] > 50;
            const isUser = userData[i + 3] > 50;

            if (isTarget) targetPixelCount++;
            if (isUser) userPixelCount++;
            if (isTarget && isUser) coveredPixelCount++;
          }
        }

        const coverRate = targetPixelCount === 0 ? 0 : coveredPixelCount / targetPixelCount;
        const isNotCheating = userPixelCount < targetPixelCount * 3.5;
        const userStrokeCount = pathsRef.current.length;
        const targetStrokeCount = questions[currentIndex].stroke;
        const isStrokeCorrect = userStrokeCount === targetStrokeCount;

        let finalDifficulty = difficulty;
        if (targetStrokeCount <= 2) {
          finalDifficulty -= 0.15; 
        } else if (targetStrokeCount <= 4) {
          finalDifficulty -= 0.10; 
        } else if (targetStrokeCount <= 6) {
          finalDifficulty -= 0.05; 
        }
        finalDifficulty = Math.max(0.30, finalDifficulty);

        const isCorrect = isStrokeCorrect && (coverRate >= finalDifficulty) && isNotCheating; 
        
        if (isCorrect) {
          setFeedback('⭕️');
          if (!hasMistaked) {
            setScore(s => s + 1);
            addScoreToLocal(); // ★一発正解時のみ全体スコア加算
          }
          setTimeout(() => {
            goToNextQuestion('WRITE');
          }, 1500);
        } else {
          setFeedback('❌');
          setHasMistaked(true); // ★ミス記録
          if (!isStrokeCorrect) {
            setErrorMessage(`かくすう が ちがうよ！\n(せいかいは ${targetStrokeCount} かく)`);
          } else {
            setErrorMessage(`かたちが すこし ちがうみたい`);
          }
          
          const bgCanvas = bgCanvasRef.current;
          if (bgCanvas) {
            const bgCtx = bgCanvas.getContext('2d');
            bgCtx.font = `340px "UD Digi Kyokasho N-B", "UD デジタル 教科書体 N-B", "Klee One", serif`;
            bgCtx.textAlign = 'center';
            bgCtx.textBaseline = 'middle';
            bgCtx.fillStyle = 'rgba(224, 122, 95, 0.3)'; // terracotta
            bgCtx.fillText(questions[currentIndex].k, bgCanvas.width / 2, bgCanvas.height / 2);
          }

          setTimeout(() => {
            setFeedback(null);
            setErrorMessage('');
            setGameState('PRACTICE'); 
          }, 2500);
        }
      };

      const displayUnitName = selectedUnits.length === 1 
        ? selectedUnits[0] 
        : `${selectedUnits[0]} など ${selectedUnits.length}つのノート`;

      // ★ポータルに戻る処理
      const backToPortal = () => {
        onBack()
      };

      return (
        <div className="w-full h-full flex flex-col items-center justify-center relative overflow-hidden bg-cork">
          
          {(gameState === 'TITLE' || gameState === 'UNIT_SELECT') && (
            <>
              <button 
                onClick={backToPortal}
                className="absolute top-4 left-4 sm:top-6 sm:left-6 bg-white/90 text-bluegrey px-4 py-2 rounded-full font-bold shadow-sm hover:shadow-md transition-all z-40 border border-gray-200 text-sm sm:text-base"
              >
                ← ドリルにもどる
              </button>
              <button 
                onClick={() => setIsSettingsOpen(true)}
                className="absolute top-4 right-4 sm:top-6 sm:right-6 bg-white/80 text-bluegrey w-12 h-12 sm:w-14 sm:h-14 rounded-full flex items-center justify-center text-2xl sm:text-3xl shadow-sm hover:shadow-md transition-all z-40 border border-gray-200"
              >
                ⚙️
              </button>
            </>
          )}

          {isSettingsOpen && (
            <div className="absolute inset-0 bg-black/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-paper p-6 sm:p-8 rounded-2xl shadow-2xl w-full max-w-md relative animate-pop-in border border-white">
                <h2 className="font-rounded text-3xl font-bold mb-6 text-center text-bluegrey border-b-2 border-sage pb-2">せってい</h2>
                
                <div className="mb-8">
                  <p className="font-rounded text-bluegrey/80 mb-4 text-xl text-center">ペンの ふとさ</p>
                  <div className="flex justify-center gap-4 sm:gap-6">
                    {[
                      { size: 15, label: 'ほそい' },
                      { size: 35, label: 'ふつう' },
                      { size: 55, label: 'ふとい' }
                    ].map(p => (
                      <button
                        key={p.size}
                        onClick={() => setPenSize(p.size)}
                        className={`w-20 h-20 rounded-full flex flex-col items-center justify-center border-2 transition-all ${
                          penSize === p.size 
                            ? 'bg-sage border-sage text-white shadow-inner scale-110' 
                            : 'bg-white border-gray-300 text-gray-400 hover:bg-gray-50'
                        }`}
                      >
                        <div className="bg-current rounded-full mb-1" style={{ width: p.size/2.5, height: p.size/2.5 }}></div>
                        <span className="font-rounded text-xs">{p.label}</span>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="mb-10">
                  <p className="font-rounded text-bluegrey/80 mb-4 text-xl text-center">はんていの きびしさ</p>
                  <div className="flex justify-center gap-2 sm:gap-4">
                    {[
                      { rate: 0.45, label: 'かんたん' },
                      { rate: 0.60, label: 'ふつう' },
                      { rate: 0.75, label: 'むずかしい' }
                    ].map(d => (
                      <button
                        key={d.rate}
                        onClick={() => setDifficulty(d.rate)}
                        className={`px-3 py-3 sm:px-4 sm:py-4 font-rounded text-sm sm:text-base rounded-xl transition-all ${
                          difficulty === d.rate
                            ? 'bg-sage text-white shadow-inner'
                            : 'bg-white border border-gray-300 text-gray-500 hover:bg-gray-50'
                        }`}
                      >
                        {d.label}
                      </button>
                    ))}
                  </div>
                </div>

                <button 
                  onClick={() => setIsSettingsOpen(false)}
                  className="w-full bg-terracotta text-white font-rounded py-4 rounded-full shadow-md active:translate-y-1 active:shadow-sm text-2xl transition-all"
                >
                  とじる
                </button>
              </div>
            </div>
          )}

          {gameState === 'TITLE' && (
            <div className="w-full h-full flex flex-col items-center justify-center p-4">
              <div className="bg-paper px-8 py-4 sm:py-6 rounded-sm shadow-md mb-8 transform -rotate-1 relative">
                <div className="masking-tape"></div>
                <h1 className="font-rounded text-4xl sm:text-5xl font-bold text-bluegrey tracking-wider">カンジノート</h1>
              </div>
              <p className="font-rounded text-white bg-bluegrey/80 px-4 py-1 rounded-full mb-8 text-sm sm:text-base">がくねん を えらんでね</p>
              <div className="grid grid-cols-2 md:grid-cols-3 gap-6 sm:gap-10 w-full max-w-2xl px-4">
                {[1, 2, 3, 4, 5, 6].map(grade => (
                  <GradeBox key={grade} grade={grade} onClick={() => selectGrade(grade)} />
                ))}
              </div>
            </div>
          )}

          {gameState === 'UNIT_SELECT' && (
            <div className="w-full h-full flex flex-col items-center relative">
              <div className="w-full flex-none pt-4 px-4 flex flex-col items-center">
                <div className="w-full max-w-4xl flex flex-col sm:flex-row justify-between items-center mb-4 gap-4 bg-paper/90 p-4 rounded-lg shadow-sm border border-white">
                  <button onClick={() => setGameState('TITLE')} className="font-rounded text-bluegrey/70 underline text-lg hover:text-bluegrey">← がくねんをえらびなおす</button>
                  <h2 className="font-rounded text-2xl font-bold text-bluegrey">{selectedGrade}ねんせい の ノート</h2>
                </div>
                <div className="w-full max-w-4xl flex justify-end gap-6 px-2 mb-2">
                  <button onClick={() => setSelectedUnits(Object.keys(KANJI_DATA[selectedGrade]))} className="font-rounded text-sm font-bold text-sage underline hover:text-green-700 transition-colors">すべてえらぶ</button>
                  <button onClick={() => setSelectedUnits([])} className="font-rounded text-sm font-bold text-terracotta underline hover:text-red-700 transition-colors">ぜんぶけす</button>
                </div>
              </div>
              
              <div className="w-full flex-1 overflow-y-auto px-4 pb-32">
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 w-full max-w-4xl mx-auto">
                  {Object.keys(KANJI_DATA[selectedGrade]).map(unit => (
                    <UnitNote 
                      key={unit} 
                      grade={selectedGrade} 
                      title={unit} 
                      isSelected={selectedUnits.includes(unit)}
                      onClick={() => toggleUnit(unit)} 
                    />
                  ))}
                </div>
              </div>

              {selectedUnits.length > 0 && (
                <div className="absolute bottom-6 w-full flex justify-center animate-open-note z-10 px-4 pointer-events-none">
                  <button 
                    onClick={decideUnits}
                    className="bg-sage text-white font-rounded py-3 px-8 sm:py-4 sm:px-12 rounded-full shadow-lg active:translate-y-1 active:shadow-md flex items-center justify-center gap-3 text-lg sm:text-xl transition-all border-4 border-white w-full max-w-sm pointer-events-auto"
                  >
                    <span>{selectedUnits.length}つのノートをひらく</span>
                  </button>
                </div>
              )}
            </div>
          )}

          {gameState === 'INSERTING' && (
            <div className="w-full h-full flex items-center justify-center bg-black/20 backdrop-blur-sm z-50 absolute top-0 left-0">
              <div className="bg-paper p-8 rounded-lg shadow-xl flex flex-col items-center animate-pop-in">
                <div className="w-16 h-16 border-4 border-sage border-t-transparent rounded-full animate-spin mb-4"></div>
                <p className="font-rounded text-bluegrey text-xl font-bold">ノートをひらいています...</p>
              </div>
            </div>
          )}

          {['MENU', 'READ', 'WRITE', 'PRACTICE', 'RESULT'].includes(gameState) && (
            <div className="w-full h-full flex flex-col p-4 sm:p-8 relative">
              <div className="w-full max-w-4xl mx-auto flex-1 flex flex-col items-center justify-center bg-paper rounded-sm shadow-xl text-gray-900 p-4 sm:p-6 overflow-hidden relative animate-open-note border border-white">
                
                {gameState === 'MENU' && (
                  <div className="text-center w-full relative h-full flex flex-col items-center justify-center">
                    <button 
                      onClick={() => setGameState('UNIT_SELECT')} 
                      className="absolute top-2 left-2 font-rounded text-bluegrey/60 underline hover:text-bluegrey text-sm sm:text-base"
                    >
                      ← もどる
                    </button>
                    
                    <div className="bg-white px-8 py-4 rounded-full shadow-sm mb-8 border border-gray-100 flex flex-col items-center">
                      <p className="font-rounded text-sage font-bold mb-1">{selectedGrade}年生</p>
                      <h2 className="font-rounded text-xl sm:text-2xl font-bold text-bluegrey border-b-2 border-sage pb-1 inline-block">
                        {displayUnitName}

          } else if (pattern === 4) {
            const angle = rand(4, 12) * 10; const times = rand(2, 4);
            return { q: `ある 三角形の ${times}倍の 拡大図を 描きます。\nもとの 三角形の 1つの 角が ${angle}度 のとき、\n拡大図の 対応する 角の 大きさは 何度 ですか？`, a: String(angle), isHissan: false };
          } else {
            const cm = rand(3, 8); const times = rand(2, 5);
            return { q: `辺の 長さが ${cm}cm の 四角形が あります。\nこの 四角形の ${times}倍の 拡大図を 描くと、\n対応する 辺の 長さは 何cm に なりますか？`, a: String(cm * times), isHissan: false };
          }
        }),
        "円の面積": () => generateUnique(() => {
          const r = rand(2, 5);
          return { q: `半径 ${r}cm の 円の 面積は\n何cm² ですか。(円周率 3.14)`, a: String(Math.round(r * r * 3.14 * 100) / 100), isHissan: true };
        }),
        "角柱と円柱の体積": () => generateUnique(() => {
          const s = rand(10, 30), h = rand(5, 10);
          return { q: `底面積が ${s}cm²、高さが ${h}cm の\n角柱の 体積は 何cm³ ですか。`, a: String(s * h), isHissan: true };
        }),
        "およその面積と体積": () => generateUnique(() => {
          const pattern = rand(1, 5);
          if (pattern === 1) {
            const w = rand(5, 10) * 10; const h = rand(5, 10) * 10;
            return { q: `ある 森の 形を、\nだいたい たて${h}m、横${w}m の\n長方形と みなすと、\nおよその 面積は 何m² ですか？`, a: String(w * h), isHissan: true };
          } else if (pattern === 2) {
            const b = rand(4, 9) * 10; const h = rand(4, 9) * 10;
            return { q: `ある 島の 形を、\n底辺${b}km、高さ${h}km の\n三角形と みなすと、\nおよその 面積は 何km² ですか？`, a: String((b * h) / 2), isHissan: true };
          } else if (pattern === 3) {
            const r = rand(2, 5) * 10; const area = (r * r * 314) / 100;
            return { q: `ある 湖の 形を、\n半径${r}m の 円と みなすと、\nおよその 面積は 何m² ですか？\n（円周率は 3.14 とします）`, a: String(area), isHissan: true };
          } else if (pattern === 4) {
            const w = rand(2, 5) * 10; const d = rand(2, 5) * 10; const h = rand(3, 8) * 10;
            return { q: `ある 大きな ビルを、\nたて${d}m、横${w}m、高さ${h}m の\n直方体と みなすと、\nおよその 体積は 何m³ ですか？`, a: String(w * d * h), isHissan: true };
          } else {
            const r = rand(2, 5); const h = rand(5, 10); const volume = (r * r * h * 314) / 100;
            return { q: `大きな 丸太（まるた）を、\n底面の 半径${r}m、長さ${h}m の\n円柱と みなすと、\nおよその 体積は 何m³ ですか？\n（円周率は 3.14 とします）`, a: String(volume), isHissan: true };
          }
        }),        
        "比例と反比例": () => generateUnique(() => {
          const a = rand(2, 5), x1 = rand(2, 3), y1 = a * x1, x2 = rand(4, 6);
          return { q: `y は x に 比例しています。\nx が ${x1} のとき y は ${y1} です。\nx が ${x2} のとき、y はいくつですか。`, a: String(a * x2), isHissan: true };
        }),
        "並べ方と組み合わせ方": () => generateUnique(() => {
          const n = rand(3, 4); let ans = 1; for(let i=1; i<=n; i++) ans *= i;
          return { q: `${n}人が 1列に 並ぶ 並べ方は、\n全部で 何通り ありますか。`, a: String(ans), isHissan: false };
        })
      }
    };

    const SymmetryFigure = ({ data }) => {
      if (!data) return null;
      if (data.type === 'line') {
        return (
          <svg viewBox="0 0 100 100" className="w-auto h-28 sm:h-36 mb-2 drop-shadow-md shrink-0 bg-white rounded-md border border-gray-200">

            <line x1="50" y1="10" x2="50" y2="90" stroke="#ef4444" strokeWidth="2" strokeDasharray="4,4" />
            <circle cx="25" cy="50" r="3" fill="#E07A5F" />
            <circle cx="75" cy="50" r="3" fill="#E07A5F" />
          </svg>
        );
      }
      if (data.type === 'point') {
        return (
          <svg viewBox="0 0 100 100" className="w-auto h-28 sm:h-36 mb-2 drop-shadow-md shrink-0 bg-white rounded-md border border-gray-200">

      if (data.type === 'polygon') {
        const pts = [];
        for (let i = 0; i < data.sides; i++) {

          pts.push(`${50 + 35 * Math.cos(angle)},${50 + 35 * Math.sin(angle)}`);

        return (
          <svg viewBox="0 0 100 100" className="w-auto h-28 sm:h-36 mb-2 drop-shadow-md shrink-0 bg-white rounded-md border border-gray-200">
            <polygon points={pts.join(' ')} fill="rgba(242, 204, 143, 0.2)" stroke="#3D405B" strokeWidth="2" strokeLinejoin="round" />
          </svg>
        );
      }
      return null;
    };

    const PieGraph = ({ data }) => {
      if (!data) return null;
      let currentAngle = -Math.PI / 2;
      const paths = data.values.map((val, idx) => {
        const angle = (val / 100) * 2 * Math.PI;
        const nextAngle = currentAngle + angle;
        const d = `M 50 50 L ${50+45*Math.cos(currentAngle)} ${50+45*Math.sin(currentAngle)} A 45 45 0 ${angle > Math.PI ? 1 : 0} 1 ${50+45*Math.cos(nextAngle)} ${50+45*Math.sin(nextAngle)} Z`;
        const labelAngle = currentAngle + angle / 2;
        currentAngle = nextAngle;
        return (
          <g key={idx}>
            <path d={d} fill={["#E07A5F", "#F2CC8F", "#81B29A", "#3D405B", "#e2e8f0"][idx % 5]} stroke="#fff" strokeWidth="1" />
            <text x={50+27*Math.cos(labelAngle)} y={50+27*Math.sin(labelAngle)} fontSize="7" textAnchor="middle" dominantBaseline="central" fill={idx===3?"#fff":"#3D405B"} fontWeight="bold">
              {data.labels[idx]}
            </text>
          </g>
        );
      });
      return <svg viewBox="0 0 100 100" className="w-auto h-32 sm:h-40 mb-2 drop-shadow-md shrink-0 bg-white rounded-md border border-gray-200">{paths}</svg>;
    };

    const BandGraph = ({ data }) => {
      if (!data) return null;
      let currentX = 0;
      const rects = data.values.map((val, idx) => {
        const width = (val / 100) * 300;
        const x = currentX; 
        currentX += width;
        return (
          <g key={idx}>
            <rect x={x} y="30" width={width} height="40" fill={["#E07A5F", "#F2CC8F", "#81B29A", "#3D405B", "#e2e8f0"][idx % 5]} stroke="#fff" strokeWidth="1" />
            {30 < width && (
              <text x={x + width/2} y="50" fontSize="12" textAnchor="middle" dominantBaseline="central" fill={idx===3?"#fff":"#3D405B"} fontWeight="bold">
                {data.labels[idx]}
              </text>
            )}
          </g>
        );
      });
      return (
        <svg viewBox="0 0 300 100" className="w-full max-w-[400px] h-auto max-h-[100px] sm:max-h-[120px] mb-2 drop-shadow-sm shrink-0 bg-white rounded-md border border-gray-200">
          {rects}
          <text x="0" y="85" fontSize="12" fill="#3D405B" fontWeight="bold">0%</text>
          <text x="300" y="85" fontSize="12" textAnchor="end" fill="#3D405B" fontWeight="bold">100%</text>
          {[25, 50, 75].map(t => (
            <g key={t}>
              <line x1={(t/100)*300} y1="25" x2={(t/100)*300} y2="75" stroke="#3D405B" strokeWidth="1" strokeDasharray="2,2"/>
              <text x={(t/100)*300} y="85" fontSize="12" textAnchor="middle" fill="#3D405B" fontWeight="bold">{t}</text>
            </g>
          ))}
        </svg>
      );
    };

    const BarGraph = ({ data }) => {
      if (!data) return null;
      const yTicks = [];
      const barW = (335 / data.labels.length) * 0.5;
      if (data.subStep) {
        for (let i = 0; i <= data.max; i += data.subStep) {
          if (i % data.step !== 0) {
            yTicks.push(<line key={`suby${i}`} x1="45" y1={35+230-(i/data.max)*230} x2="380" y2={35+230-(i/data.max)*230} stroke="#e2e8f0" strokeWidth="1" />);
          }
        }
      }
      for (let i=0; i<=data.max; i+=data.step) {
        yTicks.push(
          <g key={`y${i}`}>
            <line x1="45" y1={35+230-(i/data.max)*230} x2="380" y2={35+230-(i/data.max)*230} stroke="#94a3b8" strokeWidth="1.5" />
            <text x="37" y={35+230-(i/data.max)*230+4} fontSize="14" textAnchor="end" fill="#3D405B">{i}</text>

      const bars = data.labels.map((lbl, idx) => (
        <g key={`bar${idx}`}>
          <rect x={45+(335/data.labels.length)*idx+(335/data.labels.length-barW)/2} y={35+230-(data.values[idx]/data.max)*230} width={barW} height={(data.values[idx]/data.max)*230} fill="#81B29A" rx="2" />
          <text x={45+(335/data.labels.length)*idx+(335/data.labels.length)/2} y="283" fontSize="14" textAnchor="middle" fill="#3D405B" fontWeight="bold">{lbl}</text>

      return (
        <svg viewBox="0 0 400 300" className="w-full max-w-[400px] h-auto max-h-[150px] sm:max-h-[200px] mb-2 drop-shadow-sm shrink-0 bg-white rounded-md border border-gray-200">
          <text x="200" y="20" fontSize="16" textAnchor="middle" fill="#3D405B" fontWeight="bold">{data.title}</text>
          {yTicks}
          {bars}
          <line x1="45" y1="35" x2="45" y2="265" stroke="#3D405B" strokeWidth="2"/>
          <line x1="45" y1="265" x2="380" y2="265" stroke="#3D405B" strokeWidth="2"/>

    const LineGraph = ({ data }) => {
      if (!data) return null;
      const yTicks = [];
      const pts = data.labels.map((lbl, idx) => ({ x: 45 + (335 / (data.labels.length - 1)) * idx, y: 35 + 230 - (data.values[idx] / data.max) * 230, lbl }));
      if (data.subStep) {
        for (let i = 0; i <= data.max; i += data.subStep) {
          if (i % data.step !== 0) {
            yTicks.push(<line key={`suby${i}`} x1="45" y1={35+230-(i/data.max)*230} x2="380" y2={35+230-(i/data.max)*230} stroke="#e2e8f0" strokeWidth="1" />);
          }
        }
      }
      for (let i=0; i<=data.max; i+=data.step) {

    const TriangleFigure = ({ data }) => {
      if (!data) return null;

    const AngleFigure = ({ data }) => {

      return <svg viewBox="0 0 100 100" className="w-auto h-24 sm:h-32 mb-2 drop-shadow-md shrink-0 bg-white rounded-md border border-gray-200"><polygon points={pts} fill="rgba(129, 178, 154, 0.2)" stroke="#81B29A" strokeWidth="3" strokeLinejoin="round" /></svg>;

    const AreaFigure = ({ data }) => {

    const SolidFigure = ({ data }) => {

    const ClockFace = ({ timeStr }) => {

          {[...Array(60)].map((_, i) => i%5!==0 && (

          {[...Array(12)].map((_, i) => (

          {[...Array(12)].map((_, i) => (
            <text key={`text${i}`} x={50+31*Math.sin((i+1)*30*Math.PI/180)} y={51-31*Math.cos((i+1)*30*Math.PI/180)} textAnchor="middle" dominantBaseline="central" fontSize="12" fill="#3D405B" fontWeight="bold">
              {i+1}
            </text>
          ))}
          <line x1="50" y1="50" x2="50" y2="26" transform={`rotate(${ha} 50 50)`} stroke="#E07A5F" strokeWidth="4" strokeLinecap="round" />
          <line x1="50" y1="50" x2="50" y2="12" transform={`rotate(${ma} 50 50)`} stroke="#81B29A" strokeWidth="3" strokeLinecap="round" />
          <circle cx="50" cy="50" r="3.5" fill="#3D405B" />
        </svg>

    const ScaleFigure = ({ data }) => {
      if (!data) return null;
      const angle = (data.g / 2000) * 360;
      const ticks = [];
      for (let i = 0; i < 20; i++) {
        const a = (i * 18 - 90) * (Math.PI / 180);
        const isMajor = i % 2 === 0;
        const r1 = 95, r2 = isMajor ? 80 : 85;
        const x1 = 100 + r1 * Math.cos(a), y1 = 100 + r1 * Math.sin(a);
        const x2 = 100 + r2 * Math.cos(a), y2 = 100 + r2 * Math.sin(a);
        ticks.push(<line key={`tick${i}`} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#333" strokeWidth={isMajor ? 2 : 1} />);
        
        if (isMajor) {
          const rText = 60;
          const tx = 100 + rText * Math.cos(a), ty = 100 + rText * Math.sin(a) + 4;
          let label = "";
          if (i === 0) label = "0";
          else if (i === 10) label = "1kg";
          else label = (i % 10) * 100 + "g";
          ticks.push(<text key={`label${i}`} x={tx} y={ty} fontSize="12" textAnchor="middle" fill="#333">{label}</text>);
        }
      }

      return (
        <svg viewBox="0 0 200 200" className="w-auto h-32 sm:h-48 mb-2 drop-shadow-md shrink-0 bg-white rounded-full border border-gray-200">
          <circle cx="100" cy="100" r="95" fill="none" stroke="#66ccff" strokeWidth="4" />
          {ticks}
          <line x1="100" y1="100" x2="100" y2="25" stroke="red" strokeWidth="4" transform={`rotate(${angle} 100 100)`} />
          <circle cx="100" cy="100" r="5" fill="#333" />
        </svg>
      );
    };

    // --- 修正箇所：定規の目盛りとテープをピッタリ合わせ、テープを太くしました ---
    const RulerFigure = ({ data }) => {
      if (!data) return null;
      const ticks = [];
      const startX = 30; // 定規の左端の余白
      
      for (let i = 0; i <= 80; i++) {
        const x = startX + i * 3;
        let tickHeight = 8;
        if (i % 10 === 0) tickHeight = 20;
        else if (i % 5 === 0) tickHeight = 14;
        
        // 目盛りを y=45 から下へ向かって描画
        ticks.push(<line key={`rtick${i}`} x1={x} y1="45" x2={x} y2={45 + tickHeight} stroke="#333" strokeWidth="1" />);
        
        // 1cmごとに数字をつける
        if (i % 10 === 0) {
          const label = i / 10;
          ticks.push(<text key={`rlabel${i}`} x={x} y="82" fontSize="16" textAnchor="middle" fill="#333" fontWeight="bold">{label}</text>);
        }
      }
      
      const lineEndX = startX + data.cm * 30 + data.mm * 3;

      return (
        <svg viewBox="0 0 300 100" className="w-full max-w-[400px] h-auto max-h-[100px] sm:max-h-[120px] mb-2 drop-shadow-sm shrink-0 bg-white rounded-md border border-gray-200">
          {/* 定規の上端（横線） */}
          <line x1={startX} y1="45" x2={startX + 240} y2="45" stroke="#333" strokeWidth="1.5" />
          
          {ticks}
          
          {/* 左端の補助点線（テープから目盛りへ） */}
          <line x1={startX} y1="20" x2={startX} y2="45" stroke="#94a3b8" strokeWidth="2" strokeDasharray="3,2" />
          {/* 右端の補助点線（赤い点線で注目しやすく） */}
          <line x1={lineEndX} y1="20" x2={lineEndX} y2="45" stroke="#E07A5F" strokeWidth="2" strokeDasharray="3,2" />

          {/* 青いテープ（太さを14にアップし、定規のすぐ上に配置） */}
          <line x1={startX} y1="28" x2={lineEndX} y2="28" stroke="#5D9CEC" strokeWidth="14" strokeLinecap="butt" />
        </svg>
      );
    };

    const VolumeFigure = ({ data }) => {
      if (!data) return null;

            <text x="12.5" y="28" fontSize="11" textAnchor="middle" fill="#3D405B" fontWeight="bold">1dL</text>

          {beakersL}
          {beakersDL}

          <div className={`pin ${pinClass}`}></div>
          <span className="font-rounded text-3xl sm:text-4xl font-bold text-bluegrey mt-2">{grade}年生</span>

    };

    window.SansuApp = ({ onBack }) => {
      const [windowSize, setWindowSize] = useState({ width: window.innerWidth, height: window.innerHeight });
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

      useEffect(() => {
        const handleResize = () => { setWindowSize({ width: window.innerWidth, height: window.innerHeight }); setIsMobile(window.innerWidth < 768); };
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const [gameState, setGameState] = useState('TITLE'); 
      const [selectedGrade, setSelectedGrade] = useState(1);
      const [selectedUnits, setSelectedUnits] = useState([]);
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      
      const [inputMode, setInputMode] = useState('normal'); 
      const [userInput, setUserInput] = useState('');
      const [fractionInput, setFractionInput] = useState({ num: '', den: '' });
      const [timeInput, setTimeInput] = useState({ h: '', m: '' }); 
      const [remainderInput, setRemainderInput] = useState({ q: '', r: '' }); 
      
      const [mixedInput, setMixedInput] = useState({ u1: '', u2: '' });
      const u1InputRef = useRef(null);
      const u2InputRef = useRef(null);
      
      const [feedback, setFeedback] = useState(null);
      const [errorMessage, setErrorMessage] = useState('');
      const [mistakes, setMistakes] = useState([]);
      const [isReviewMode, setIsReviewMode] = useState(false);
      
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [handedness, setHandedness] = useState('right');
      
      const [isDrawing, setIsDrawing] = useState(false);
      const drawCanvasRef = useRef(null);
      const canvasContainerRef = useRef(null);
      
      const inputRef = useRef(null);
      const numInputRef = useRef(null);
      const denInputRef = useRef(null);
      const hourInputRef = useRef(null);
      const minInputRef = useRef(null);
      const quoInputRef = useRef(null);
      const remInputRef = useRef(null);

      const addScoreToLocal = () => {
        const currentScore = parseInt(localStorage.getItem('gogo_drill_score') || '0', 10);
        localStorage.setItem('gogo_drill_score', currentScore + 1);
      };

      const startGame = () => {
        let combinedQuestions = [];
        selectedUnits.forEach(unit => {
          if (GENERATORS[selectedGrade][unit]) {
            combinedQuestions = [...combinedQuestions, ...GENERATORS[selectedGrade][unit]()];
          }
        });
        
        if(combinedQuestions.length === 0) { alert('このたんげんの もんだいは まだ ありません！'); return; }

        const shuffled = combinedQuestions.sort(() => 0.5 - Math.random());
        setQuestions(shuffled);
        setCurrentIndex(0);
        setScore(0);
        setMistakes([]);
        setIsReviewMode(false);
        setGameState('PLAYING');
        resetQuestionState(0, shuffled);
      };

      const startReview = () => {
        const shuffledMistakes = [...mistakes].sort(() => 0.5 - Math.random());
        setQuestions(shuffledMistakes);
        setMistakes([]); 
        setCurrentIndex(0);
        setIsReviewMode(true);
        setGameState('PLAYING');
        resetQuestionState(0, shuffledMistakes);
      };

      const resetQuestionState = (nextIndex = currentIndex, qList = questions) => {
        setFeedback(null); setErrorMessage(''); setUserInput(''); setFractionInput({ num: '', den: '' }); setTimeInput({ h: '', m: '' }); setRemainderInput({ q: '', r: '' }); setMixedInput({ u1: '', u2: '' }); clearCanvas();
        const nextQ = qList[nextIndex];
        let nextMode = 'normal';
        if (nextQ && nextQ.isRemainder) nextMode = 'remainder';
        else if (nextQ && nextQ.isFractionUnit) nextMode = 'fraction';
        else if (nextQ && nextQ.isMixedUnit) nextMode = 'mixed';
        else if (nextQ && (nextQ.a.includes(':') || nextQ.timeMode)) nextMode = 'time';
        setInputMode(nextMode);
        
        setTimeout(() => {
          if (nextMode === 'fraction') numInputRef.current?.focus();
          else if (nextMode === 'time') hourInputRef.current?.focus();
          else if (nextMode === 'remainder') quoInputRef.current?.focus();
          else if (nextMode === 'mixed') u1InputRef.current?.focus();
          else inputRef.current?.focus();
        }, 50);
      };

      const handleNormalChange = (v) => setUserInput(v.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[．。、，,]/g, '.'));
      const handleFractionChange = (f, v) => setFractionInput(p => ({...p, [f]: v.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[^\d]/g, '').slice(0, 3)}));
      const handleTimeChange = (f, v) => {
        let val = v.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[^\d]/g, '').slice(0, 2);
        setTimeInput(p => ({...p, [f]: val}));
        if (f === 'h' && val.length === 2) minInputRef.current?.focus();
      };
      
      const handleRemainderChange = (f, v) => {
        let val = v.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
                    .replace(/[．。、，,]/g, '.')
                    .replace(/[^\d.]/g, '')
                    .slice(0, 6);
        setRemainderInput(p => ({...p, [f]: val}));
      };

      const handleMixedChange = (f, v) => {
        let val = v.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[^\d]/g, '').slice(0, 3);
        setMixedInput(p => ({...p, [f]: val}));
        if (f === 'u1' && val.length === 2) u2InputRef.current?.focus();
      };

      const checkAnswer = () => {
        const cur = questions[currentIndex];
        if (!cur) return;
        let ok = false, ansStr = '', err = '';
        const norm = (s) => (s || '').replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/[．。、，,]/g, '.').replace(/：/g, ':').replace(/\s+/g, '');
        
        if (inputMode === 'fraction') {
          if (!fractionInput.num && !fractionInput.den) return;
          ansStr = `${norm(fractionInput.num)}/${norm(fractionInput.den)}`;
          if (ansStr === cur.a) ok = true;
          else if (norm(fractionInput.den) === '1' && norm(fractionInput.num) === cur.a) err = 'ぶんぼ が 1 のときは、せいすう で こたえよう！';
        } else if (inputMode === 'time') {
          if (!timeInput.h && !timeInput.m) return;
          const vH = parseInt(norm(timeInput.h) || '0', 10), vM = parseInt(norm(timeInput.m) || '0', 10);
          const [aH, aM] = cur.a.split(':').map(s => parseInt(s, 10));
          if (vH === aH && vM === aM) ok = true;
          else err = `こたえ：${aH}じ ${aM}ふん`;
        } else if (inputMode === 'mixed') {
          if (!mixedInput.u1 && !mixedInput.u2) return;
          const v1 = parseInt(norm(mixedInput.u1) || '0', 10);
          const v2 = parseInt(norm(mixedInput.u2) || '0', 10);
          const [a1, a2] = cur.a.split(':').map(s => parseInt(s, 10));
          if (v1 === a1 && v2 === a2) ok = true;
          else err = `こたえ：${a1 > 0 ? a1 + cur.unit1 + ' ' : ''}${a2 > 0 ? a2 + cur.unit2 : (a1 === 0 ? '0' + cur.unit2 : '')}`;
        } else if (inputMode === 'remainder') {
          if (!remainderInput.q && !remainderInput.r) return;
          const userQ = norm(remainderInput.q);
          const userR = norm(remainderInput.r);
          
          let ansQ = cur.a;
          let ansR = '';
          if (cur.a.includes('...')) {
            const parts = cur.a.split('...');
            ansQ = parts[0];
            ansR = parts[1];
          }
          
          if (userQ === ansQ && (userR === ansR || (userR === '' && ansR === '0') || (userR === '0' && ansR === ''))) {
            ok = true;
          } else {
            err = `こたえ：${ansQ}${ansR && ansR !== '0' ? ` あまり ${ansR}` : ''}`;
          }
        } else {
          if (!userInput) return;
          ansStr = norm(userInput);
          ok = (ansStr === cur.a);
        }
        
        if (ok) { 
          setFeedback('⭕️'); 
          setErrorMessage(''); 
          if (!isReviewMode) {
            setScore(s => s + 1);
            addScoreToLocal(); 
          }
        } else { 
          setFeedback('❌'); 
          setErrorMessage(err || `こたえ：${cur.a}`); 
          setMistakes(p => [...p, cur]); 
        }
        
        setTimeout(() => { 
          if (currentIndex + 1 < questions.length) { 
            setCurrentIndex(i => i + 1); 
            resetQuestionState(currentIndex + 1, questions); 
          } else {
            setGameState('RESULT'); 
          }
        }, ok ? 1500 : 2500);
      };

      const handleKeyDown = (e) => { if (e.key === 'Enter' && feedback === null && !e.nativeEvent.isComposing) checkAnswer(); };
      const toggleInputMode = () => { const n = inputMode === 'fraction' ? 'normal' : 'fraction'; setInputMode(n); setTimeout(() => { if (n === 'fraction') numInputRef.current?.focus(); else inputRef.current?.focus(); }, 50); };

      useEffect(() => { if (gameState === 'PLAYING') setupCanvas(); }, [gameState, currentIndex, isMobile, handedness, windowSize]);
      useEffect(() => { if (gameState !== 'PLAYING') return; const observer = new ResizeObserver(() => setupCanvas(true)); if (canvasContainerRef.current) observer.observe(canvasContainerRef.current); return () => observer.disconnect(); }, [gameState, currentIndex]);

      const setupCanvas = (keep = false) => {
        if (!canvasContainerRef.current || !drawCanvasRef.current) return;
        const ctx = drawCanvasRef.current.getContext('2d'), dpr = window.devicePixelRatio || 1, rect = canvasContainerRef.current.getBoundingClientRect();
        if (rect.width === 0) { setTimeout(() => setupCanvas(keep), 100); return; }
        const w = rect.width * dpr, h = rect.height * dpr;
        if (drawCanvasRef.current.width === w && drawCanvasRef.current.height === h) return;
        let tmp = null; if (keep && drawCanvasRef.current.width > 0) { tmp = document.createElement('canvas'); tmp.width = drawCanvasRef.current.width; tmp.height = drawCanvasRef.current.height; tmp.getContext('2d').drawImage(drawCanvasRef.current, 0, 0); }
        drawCanvasRef.current.width = w; drawCanvasRef.current.height = h; ctx.scale(dpr, dpr); ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 4; ctx.strokeStyle = '#3D405B';
        if (tmp) ctx.drawImage(tmp, 0, 0, drawCanvasRef.current.width/dpr, drawCanvasRef.current.height/dpr);
      };
      
      const clearCanvas = () => { 
        if (!drawCanvasRef.current) return; 
        const ctx = drawCanvasRef.current.getContext('2d'), dpr = window.devicePixelRatio || 1; 
        ctx.clearRect(0, 0, drawCanvasRef.current.width/dpr, drawCanvasRef.current.height/dpr); 
      };
      
      const startDrawing = (e) => { if(e.cancelable) e.preventDefault(); setIsDrawing(true); const rect = drawCanvasRef.current.getBoundingClientRect(), dpr = window.devicePixelRatio || 1, x = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) * (drawCanvasRef.current.width/dpr/rect.width), y = ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top) * (drawCanvasRef.current.height/dpr/rect.height); const ctx = drawCanvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y+0.1); ctx.stroke(); };
      const draw = (e) => { if (!isDrawing) return; if(e.cancelable) e.preventDefault(); const rect = drawCanvasRef.current.getBoundingClientRect(), dpr = window.devicePixelRatio || 1, x = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) * (drawCanvasRef.current.width/dpr/rect.width), y = ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top) * (drawCanvasRef.current.height/dpr/rect.height); const ctx = drawCanvasRef.current.getContext('2d'); ctx.lineTo(x, y); ctx.stroke(); };
      const stopDrawing = () => setIsDrawing(false);

      const displayUnitName = selectedUnits.length === 1 ? selectedUnits[0] : `${selectedUnits[0]} など ${selectedUnits.length}つのノート`;

      const formatMathText = (text) => {
        if (typeof text !== 'string') return text;
        const parts = text.split(/(\d+\/\d+)/g);
        return (
          <span className="inline-flex items-center justify-center flex-wrap whitespace-pre-wrap">
            {parts.map((part, i) => {
              if (part.match(/\d+\/\d+/)) {
                const [num, den] = part.split('/');
                return (
                  <span key={i} className="inline-flex flex-col items-center justify-center align-middle mx-1" style={{ verticalAlign: 'middle', lineHeight: '1.2' }}>
                    <span className="border-b-[2px] border-current px-1 w-full text-center pb-0.5">{num}</span>
                    <span className="px-1 text-center pt-0.5">{den}</span>
                  </span>
                );
              }
              return <span key={i}>{part}</span>;
            })}
          </span>
        );
      };

      const renderQuestionBlock = () => {
        const cur = questions[currentIndex];
        return (
          <div className="flex flex-col gap-1 sm:gap-2 flex-1 min-h-0 w-full">
            <div className="w-full flex justify-between items-center text-bluegrey/70 px-2 font-bold mb-1 shrink-0">
              <button onClick={() => setGameState('MENU')} className="underline hover:text-bluegrey text-sm sm:text-base" disabled={feedback !== null}>←やめる</button>
              <div className="flex gap-4">{isReviewMode && <span className="text-terracotta animate-pulse">ふくしゅう</span>}<span>{currentIndex + 1} / {questions.length}</span>{!isReviewMode && <span>スコア: {score}</span>}</div>
            </div>
            <div className="w-full text-center bg-white/90 p-3 sm:p-6 rounded-2xl border border-gray-200 shadow-sm relative flex flex-col items-center justify-center min-h-[120px] md:min-h-[160px] gap-2 flex-1 overflow-y-auto">
              {cur && cur.isClock && <ClockFace timeStr={cur.a} />}
              {cur && cur.isGraph && <BarGraph data={cur.graphData} />}
              {cur && cur.isLineGraph && <LineGraph data={cur.graphData} />}
              {cur && cur.isTriangle && <TriangleFigure data={cur.triangleData} />}
              {cur && cur.isAngle && <AngleFigure data={cur.angleData} />}
              {cur && cur.isQuad && <QuadFigure data={cur.quadData} />}
              {cur && cur.isArea && <AreaFigure data={cur.areaData} />}
              {cur && cur.isSolid && <SolidFigure data={cur.solidData} />}
              {cur && cur.isPieGraph && <PieGraph data={cur.graphData} />}
              {cur && cur.isBandGraph && <BandGraph data={cur.graphData} />}
              {cur && cur.isSymmetry && <SymmetryFigure data={cur.symmetryData} />}
              {cur && cur.isScale && <ScaleFigure data={cur.scaleData} />}
              {cur && cur.isRuler && <RulerFigure data={cur.rulerData} />}
              {cur && cur.isVolume && <VolumeFigure data={cur.volumeData} />}

              <p className="text-xl sm:text-2xl lg:text-3xl font-kyokasho text-bluegrey tracking-wider whitespace-pre-wrap leading-snug mt-auto mb-auto px-1 w-full">
                {cur ? formatMathText(cur.q) : ''}
              </p>
              {feedback && (
                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-50 animate-pop-in bg-white/40 rounded-2xl backdrop-blur-sm">
                  <span className={`text-[7rem] sm:text-[9rem] drop-shadow-md opacity-90 leading-none ${feedback === '⭕️' ? 'text-sage' : 'text-terracotta'}`}>{feedback}</span>
                  {feedback === '❌' && errorMessage && <div className="mt-2 bg-white/95 px-4 py-2 rounded-xl border-4 border-terracotta text-terracotta text-lg sm:text-xl font-bold shadow-lg">{formatMathText(errorMessage)}</div>}
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderInputBlock = () => (
        <div className="w-full flex flex-col gap-2 mt-auto shrink-0 pb-1">
          {selectedGrade >= 3 && questions[currentIndex] && questions[currentIndex].isFractionUnit && (
            <div className="flex justify-end mb-[-4px] sm:mb-0 relative z-20"><button onClick={toggleInputMode} disabled={feedback !== null} className="text-xs sm:text-sm font-bold text-sage underline bg-white/60 px-3 py-1 rounded-t-lg hover:bg-white hover:text-green-700 transition-colors">{inputMode === 'fraction' ? '⇅ せいすう にする' : '⇅ ぶんすう にする'}</button></div>
          )}
          <div className="w-full flex md:flex-col gap-2 sm:gap-3 relative z-10">
            {inputMode === 'time' ? (
              <div className="flex-1 w-full flex items-center justify-center py-2 px-1 rounded-xl border-2 border-gray-300 bg-white shadow-inner min-w-0"><div className="flex items-baseline justify-center gap-2 sm:gap-4"><input ref={hourInputRef} type="tel" inputMode="numeric" pattern="\d*" maxLength={2} value={timeInput.h} onChange={(e) => handleTimeChange('h', e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter' && feedback === null) minInputRef.current?.focus(); }} disabled={feedback !== null} className="w-16 sm:w-20 p-2 border-b-[3px] border-terracotta font-bold text-3xl sm:text-4xl text-center focus:outline-none focus:border-sage bg-transparent" placeholder="じ" /><span className="font-bold text-2xl sm:text-3xl text-bluegrey/80">じ</span><input ref={minInputRef} type="tel" inputMode="numeric" pattern="\d*" maxLength={2} value={timeInput.m} onChange={(e) => handleTimeChange('m', e.target.value)} onKeyDown={handleKeyDown} disabled={feedback !== null} className="w-16 sm:w-20 p-2 border-b-[3px] border-sage font-bold text-3xl sm:text-4xl text-center focus:outline-none focus:border-sage bg-transparent" placeholder="ふん" /><span className="font-bold text-2xl sm:text-3xl text-bluegrey/80">ふん</span></div></div>
            ) : inputMode === 'mixed' ? (
              <div className="flex-1 w-full flex items-center justify-center py-2 px-1 rounded-xl border-2 border-gray-300 bg-white shadow-inner min-w-0">
                <div className="flex items-baseline justify-center gap-1 sm:gap-3">
                  <input ref={u1InputRef} type="tel" inputMode="numeric" pattern="\d*" maxLength={3} value={mixedInput.u1} onChange={(e) => handleMixedChange('u1', e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter' && feedback === null) u2InputRef.current?.focus(); }} disabled={feedback !== null} className="w-16 sm:w-20 p-2 border-b-[3px] border-terracotta font-bold text-3xl sm:text-4xl text-center focus:outline-none focus:border-sage bg-transparent" placeholder="" />
                  <span className="font-bold text-2xl sm:text-3xl text-bluegrey/80">{questions[currentIndex]?.unit1}</span>
                  <input ref={u2InputRef} type="tel" inputMode="numeric" pattern="\d*" maxLength={3} value={mixedInput.u2} onChange={(e) => handleMixedChange('u2', e.target.value)} onKeyDown={handleKeyDown} disabled={feedback !== null} className="w-16 sm:w-20 p-2 border-b-[3px] border-sage font-bold text-3xl sm:text-4xl text-center focus:outline-none focus:border-sage bg-transparent" placeholder="" />
                  <span className="font-bold text-2xl sm:text-3xl text-bluegrey/80">{questions[currentIndex]?.unit2}</span>
                </div>
              </div>
            ) : inputMode === 'fraction' ? (
              <div className="flex-1 w-full flex items-center justify-center p-2 rounded-xl border-2 border-gray-300 bg-white shadow-inner min-w-0"><div className="flex flex-col items-center gap-1 w-24"><input ref={numInputRef} type="tel" inputMode="numeric" pattern="\d*" maxLength={3} value={fractionInput.num} onChange={(e) => handleFractionChange('num', e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter' && feedback === null) denInputRef.current?.focus(); }} disabled={feedback !== null} className="w-full p-1 border-b-[3px] border-gray-400 font-bold text-3xl text-center focus:outline-none focus:border-sage bg-transparent" placeholder="分子" /><input ref={denInputRef} type="tel" inputMode="numeric" pattern="\d*" maxLength={3} value={fractionInput.den} onChange={(e) => handleFractionChange('den', e.target.value)} onKeyDown={handleKeyDown} disabled={feedback !== null} className="w-full p-1 font-bold text-3xl text-center focus:outline-none focus:border-sage bg-transparent" placeholder="分母" /></div></div>
            ) : inputMode === 'remainder' ? (
              <div className="flex-1 w-full flex items-center justify-center py-2 px-1 rounded-xl border-2 border-gray-300 bg-white shadow-inner min-w-0">

{

    const HIRAGANA_SEION = ['あ','い','う','え','お','か','き','く','け','こ','さ','し','す','せ','そ','た','ち','つ','て','と','な','に','ぬ','ね','の','は','ひ','ふ','へ','ほ','ま','み','む','め','も','や','ゆ','よ','ら','り','る','れ','ろ','わ','を','ん'];

    const KATAKANA_DAKUON = ['ガ','ギ','グ','ゲ','ゴ','ザ','ジ','ズ','ゼ','ゾ','ダ','ヂ','ヅ','デ','ド','バ','ビ','ブ','ベ','ボ','パ','ピ','プ','ペ','ポ'];

    const HIRAGANA_STROKES = {

    };

    const KATAKANA_STROKES = {
      'ア':2,'イ':2,'ウ':3,'エ':3,'オ':3,'カ':2,'キ':3,'ク':2,'ケ':3,'コ':2,
      'サ':3,'シ':3,'ス':2,'セ':2,'ソ':2,'タ':3,'チ':3,'ツ':3,'テ':3,'ト':2,

      'めがね', 'かぎ', 'かぐ', 'ひげ', 'りんご', 'かぜ', 'くじら', 'みず', 'かぞく', 'かたな', 'かばん', 'きっぷ', 'くるま', 'さとう', 'こくご', 'すいか', 'たいこ', 'つみき', 'とうふ', 'はなび', 'ひよこ', 'ほのお', 'まくら', 'めいし', 'もくば', 'ゆのみ', 'りんご', 'れんが',

      'ドア', 'ビル', 'ボタン', 'ピアノ', 'パンダ', 'プール', 'コップ', 'ベッド'
    ].filter(w => w.length <= 3);

    const DAKUON_REGEX = /[が-ぼぱ-ぽガ-ボパ-ポ]/;

    window.MojiApp = ({ onBack }) => {
      const [isFontLoaded, setIsFontLoaded] = useState(false);

        document.fonts.load('10px "Klee One"').then(() => setIsFontLoaded(true));

          setCurrentStep('blind');
        } else {
          setCurrentStep('trace');
          setHasMistaked(false);
          if (currentIndex + 1 < questions.length) {
            setCurrentIndex(i => i + 1);
          } else {
            setGameState('RESULT');

        }
      };

      const skipQuestion = () => {
        setFeedback(null);
        setErrorMessage('');
        pathsRef.current = [];
        currentPathRef.current = [];
        setCurrentStep('trace');
        setHasMistaked(false);
        if (currentIndex + 1 < questions.length) {
          setCurrentIndex(i => i + 1);
        } else {
          setGameState('RESULT');
        }
      };

      useEffect(() => {
        if (gameState === 'PRACTICE' && targetChars.length > 0) {
          clearCanvas();
        }
      }, [gameState, currentIndex, currentStep, questions]);

      const clearCanvas = () => {
        pathsRef.current = Array.from({ length: targetChars.length }, () => []);
        currentPathRef.current = [];
        isDrawingRef.current = false;
        activeCanvasIndexRef.current = null;
        
        targetChars.forEach((char, idx) => {
          const drawCanvas = drawCanvasRefs.current[idx];
          if (drawCanvas) {
            const drawCtx = drawCanvas.getContext('2d');
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
          }
          
          const bgCanvas = bgCanvasRefs.current[idx];
          if (bgCanvas) {
            const bgCtx = bgCanvas.getContext('2d', { willReadFrequently: true });
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.fillStyle = '#ffffff';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            bgCtx.save();
            bgCtx.strokeStyle = '#81B29A';
            bgCtx.globalAlpha = 0.5;
            bgCtx.lineWidth = 2;
            bgCtx.setLineDash([8, 8]);
            bgCtx.beginPath();
            bgCtx.moveTo(bgCanvas.width / 2, 0);
            bgCtx.lineTo(bgCanvas.width / 2, bgCanvas.height);
            bgCtx.moveTo(0, bgCanvas.height / 2);
            bgCtx.lineTo(bgCanvas.width, bgCanvas.height / 2);
            bgCtx.stroke();
            bgCtx.restore();

            if (char) {
              bgCtx.font = `340px "UD Digi Kyokasho N-B", "UD デジタル 教科書体 N-B", "Klee One", serif`;
              bgCtx.textAlign = 'center';
              bgCtx.textBaseline = 'middle';
              
              if (currentStep === 'trace') {
                bgCtx.fillStyle = 'rgba(61, 64, 91, 0.15)'; 
                bgCtx.fillText(char, bgCanvas.width / 2, bgCanvas.height / 2);
              } else if (currentStep === 'retry_trace') {
                bgCtx.fillStyle = 'rgba(224, 122, 95, 0.25)'; 
                bgCtx.fillText(char, bgCanvas.width / 2, bgCanvas.height / 2);
              }
            }
          }
        });
      };

      const getCoordinates = (e, index) => {
        const canvas = drawCanvasRefs.current[index];
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      };

      const startDrawing = (e, index) => {
        if (feedback !== null) return;
        isDrawingRef.current = true;
        activeCanvasIndexRef.current = index;
        const { x, y } = getCoordinates(e, index);
        currentPathRef.current = [{ x, y }];

      const gRef = useRef(null);

          try {
            setGeoData(JSON.parse(cachedMap));
            return;
          } catch (e) {
            console.error("Cache read error");
          }
        }

        const fetchMap = async () => {
          try {
            const res = await fetch('https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson');
            if (!res.ok) throw new Error('Network error');
            const data = await res.json();
            
            try {
              localStorage.setItem('gogo_drill_japan_geojson', JSON.stringify(data));
            } catch(e) {}
            
            setGeoData(data);
          } catch (error) {
            console.error("Map fetch error:", error);
            setHasError(true);
          }
        };

        fetchMap();
      }, []);

        if (!geoData || !currentPrefId || !gRef.current) return;

        const g = d3.select(gRef.current);
        const width = 800;
        const height = 800;
        const projection = d3.geoMercator().fitSize([width - 10, height - 10], geoData);
        const pathGenerator = d3.geoPath().projection(projection);

        let targetFeature = null;
        geoData.features.forEach(feature => {
          const props = feature.properties;
          const nameStr = props.nam_ja || props.name_ja || props.name_local || props.name || props.nam || "";
          
          let prefId = null;
          if (props.id) prefId = parseInt(props.id, 10);

            const cleanGeoName = nameStr.replace(/(都|道|府|県)$/, '');
            const cleanPrefName = p.name.replace(/(都|道|府|県)$/, '');
            return cleanGeoName === cleanPrefName;

          if (pref && pref.id === currentPrefId) {
            targetFeature = feature;

          const dy = bounds[1][1] - bounds[0][1];
          const x = (bounds[0][0] + bounds[1][0]) / 2;
          const y = (bounds[0][1] + bounds[1][1]) / 2;

          const translate = [width / 2 - scale * x, height / 2 - scale * y];

            .delay(600)    
            .duration(1500) 
            .ease(d3.easeCubicInOut)

                    <span className={`text-[12rem] drop-shadow-xl font-bold ${feedback === '⭕️' ? 'text-sage' : 'text-terracotta'} animate-pop-in`}>

    // --- カテゴリ選択用ノートコンポーネント ---
    const CategoryNote = ({ category, onClick, isSelected, pinColorClass }) => {
      return (

          onClick={onClick}
          className={`bg-white w-full h-24 sm:h-28 rounded-sm flex flex-col items-center justify-center relative cursor-pointer transition-all p-3 
            ${isSelected 
              ? 'border-4 border-terracotta transform -translate-y-1 shadow-lg ring-2 ring-terracotta/30'

        >
          {isSelected && (
            <div className="absolute -top-3 -right-3 w-7 h-7 sm:w-8 sm:h-8 bg-terracotta text-white rounded-full flex items-center justify-center font-bold text-lg sm:text-xl shadow-md border-2 border-white z-20">

            </div>

            {category}
          </span>
        </div>
      );
    };

    // --- メインアプリケーション ---
    window.ChizukigoApp = ({ onBack }) => {
      const [gameState, setGameState] = useState('TITLE'); // 'TITLE', 'SELECT', 'QUIZ', 'RESULT'
      const [selectedCategories, setSelectedCategories] = useState([]);
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [options, setOptions] = useState([]);
      const [hasMistaked, setHasMistaked] = useState(false);

      // ポータルサイトへスコアを加算保存
      const addScoreToLocal = () => {
        try {
          const currentScore = parseInt(localStorage.getItem('gogo_drill_score') || '0', 10);
          localStorage.setItem('gogo_drill_score', currentScore + 1);
        } catch(e) {
          console.warn("localStorage not available");
        }
      };

      const toggleCategory = (category) => {
        setSelectedCategories(prev => 
          prev.includes(category) 
            ? prev.filter(c => c !== category) 
            : [...prev, category]
        );
      };

      const startGame = () => {
        if (selectedCategories.length === 0) {
          alert('しゅるいを 1つ以上 えらんでね！');
          return;
        }
        
        let targetSymbols = SYMBOL_DATA.filter(s => selectedCategories.includes(s.category));
        targetSymbols = targetSymbols.sort(() => 0.5 - Math.random());
        
        setQuestions(targetSymbols);
        setCurrentIndex(0);
        setScore(0);
        setHasMistaked(false);
        setFeedback(null);
        setGameState('QUIZ');
      };

      useEffect(() => {
        if (gameState === 'QUIZ' && questions.length > 0) {
          const currentSymbol = questions[currentIndex];
          
          const sameCategory = SYMBOL_DATA.filter(s => s.category === currentSymbol.category && s.id !== currentSymbol.id);
          const others = SYMBOL_DATA.filter(s => s.category !== currentSymbol.category);
          
          let newOptions = sameCategory.sort(() => 0.5 - Math.random()).slice(0, 3);
          
          if (newOptions.length < 3) {
            const extra = others.sort(() => 0.5 - Math.random()).slice(0, 3 - newOptions.length);
            newOptions = [...newOptions, ...extra];
          }
          
          newOptions.push(currentSymbol);
          setOptions(newOptions.sort(() => 0.5 - Math.random()));
        }
      }, [gameState, currentIndex, questions]);

      const handleAnswer = (opt) => {
        if (feedback !== null) return; 

        const isCorrect = opt.id === questions[currentIndex].id;

        if (isCorrect) {
          setFeedback('⭕️');
          if (!hasMistaked) {
            setScore(s => s + 1);
            addScoreToLocal();
          }
          
          setTimeout(() => {
            if (currentIndex + 1 < questions.length) {
              setCurrentIndex(i => i + 1);
              setHasMistaked(false);
              setFeedback(null);
            } else {
              setGameState('RESULT');
              setFeedback(null);
            }
          }, 1200);
        } else {
          setFeedback('❌');
          setHasMistaked(true);
          
          setTimeout(() => {
            setFeedback(null);
          }, 1200);
        }
      };

      const backToPortal = () => {
        onBack()
      };

      return (
        <div className="w-full h-full flex flex-col items-center justify-center relative overflow-hidden bg-cork">
          
          {(gameState === 'TITLE' || gameState === 'SELECT') && (
            <button 
              onClick={backToPortal}
              className="absolute top-4 left-4 sm:top-6 sm:left-6 bg-white/90 text-bluegrey px-4 py-2 rounded-full font-bold shadow-sm hover:shadow-md transition-all z-40 border border-gray-200 text-sm sm:text-base"
            >
              ← ドリルにもどる
            </button>
          )}

          {gameState === 'TITLE' && (
            <div className="w-full max-w-md mx-auto flex flex-col items-center justify-center p-4">

                <h1 className="font-rounded text-4xl sm:text-5xl font-bold text-bluegrey tracking-widest text-center mt-2 leading-tight">
                  チズキゴウ<br/>ノート
                </h1>
                <p className="text-center text-sage font-bold mt-4 text-sm sm:text-base bg-white/80 py-1 px-4 rounded-full">
                  よめるかな？ 地図記号クイズ
                </p>
              </div>
              
              <button 
                onClick={() => setGameState('SELECT')}
                className="w-full bg-terracotta text-white font-rounded py-4 rounded-full shadow-lg active:translate-y-1 active:shadow-md text-2xl font-bold transition-all border-4 border-white"
              >
                はじめる
              </button>
            </div>
          )}

          {gameState === 'SELECT' && (
            <div className="w-full h-full flex flex-col items-center relative py-6">
              <div className="w-full max-w-4xl mx-auto flex flex-col items-center mb-4 bg-paper/90 p-4 rounded-lg shadow-sm border border-white mt-12 sm:mt-0">
                <h2 className="font-rounded text-xl sm:text-2xl font-bold text-bluegrey">
                  どの しゅるい に チャレンジする？
                </h2>
                <p className="text-sm text-gray-500 mt-1">（いくつでも えらべるよ）</p>
              </div>

              <div className="w-full max-w-3xl flex justify-end gap-4 px-4 mb-2">
                <button onClick={() => setSelectedCategories([...CATEGORIES])} className="font-rounded text-sm font-bold text-sage underline">全部えらぶ</button>
                <button onClick={() => setSelectedCategories([])} className="font-rounded text-sm font-bold text-terracotta underline">全部けす</button>
              </div>

              <div className="w-full flex-1 overflow-y-auto px-4 pb-32">
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 w-full max-w-3xl mx-auto">
                  {CATEGORIES.map((category, index) => (
                    <CategoryNote 
                      key={category} 
                      category={category} 
                      isSelected={selectedCategories.includes(category)}
                      onClick={() => toggleCategory(category)}
                      pinColorClass={['pin-blue', 'pin-green', 'pin-yellow'][index % 3]}
                    />
                  ))}
                </div>
              </div>

              {selectedCategories.length > 0 && (
                <div className="absolute bottom-6 w-full flex justify-center animate-open-note z-10 px-4 pointer-events-none">
                  <button 
                    onClick={startGame}
                    className="bg-sage text-white font-rounded py-3 sm:py-4 px-10 rounded-full shadow-lg active:translate-y-1 active:shadow-md text-xl font-bold transition-all border-4 border-white w-full max-w-sm pointer-events-auto"
                  >
                    クイズを スタート！
                  </button>
                </div>
              )}
            </div>
          )}

          {gameState === 'QUIZ' && questions.length > 0 && (
            <div className="w-full h-full flex flex-col p-2 sm:p-4 relative">
              <div className="w-full max-w-3xl mx-auto flex-1 flex flex-col items-center bg-paper rounded-sm shadow-xl p-3 sm:p-6 overflow-hidden relative animate-open-note border border-white">
                
                <div className="w-full flex justify-between items-center font-rounded text-sm sm:text-base text-bluegrey/70 mb-2 sm:mb-4 px-2">
                  <button 
                    onClick={() => setGameState('SELECT')} 
                    className="underline hover:text-bluegrey bg-white/50 px-3 py-1 rounded-full"
                    disabled={feedback !== null}
                  >
                    ← やめる
                  </button>
                  <div className="flex gap-3 font-bold">
                    <span className="bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100">
                      {currentIndex + 1} / {questions.length} 問
                    </span>
                    <span className="bg-white px-3 py-1 rounded-full shadow-sm text-terracotta border border-gray-100">
                      スコア: {score}
                    </span>
                  </div>
                </div>

                {/* 【修正】地図記号の枠を小さくし、画面下部の見切れを防ぎました */}
                <div className="w-full aspect-square max-h-[30vh] sm:max-h-[40vh] bg-white rounded-xl border-4 border-sage shadow-inner flex flex-col items-center justify-center p-4 sm:p-8 relative shrink-0">
                   <div className="absolute top-3 left-3 w-4 h-4 rounded-full bg-gray-200 shadow-inner"></div>
                   <div className="absolute top-3 right-3 w-4 h-4 rounded-full bg-gray-200 shadow-inner"></div>
                   <div className="absolute bottom-3 left-3 w-4 h-4 rounded-full bg-gray-200 shadow-inner"></div>
                   <div className="absolute bottom-3 right-3 w-4 h-4 rounded-full bg-gray-200 shadow-inner"></div>
                   
                   <div className="w-3/4 h-3/4 max-w-[160px] max-h-[160px]">
                      {questions[currentIndex].svg}
                   </div>
                </div>

                <div className="text-center my-3 sm:my-4 shrink-0 z-10">
                  <p className="text-base sm:text-xl font-bold text-bluegrey bg-white/80 backdrop-blur-sm px-6 py-2 rounded-full shadow-sm border border-gray-100">
                    この 地図記号は なあに？
                  </p>
                </div>

                <div className="grid grid-cols-2 gap-3 w-full max-w-md mt-auto pb-4 px-2 z-10">
                  {options.map(opt => (
                    <button 
                      key={opt.id}
                      onClick={() => handleAnswer(opt)}
                      disabled={feedback !== null}
                      className="bg-white border-b-4 border-mustard text-bluegrey font-rounded py-3 sm:py-4 rounded-lg shadow-md hover:bg-mustard/10 active:translate-y-1 active:border-b-0 transition-all font-bold flex flex-col items-center justify-center"

                      <span className="text-[10px] sm:text-xs text-gray-500 font-normal mb-0.5">{opt.kana}</span>
                      <span className="text-base sm:text-2xl leading-tight">{opt.name}</span>
                    </button>
                  ))}
                </div>

                {feedback && (
                  <div className="absolute inset-0 flex items-center justify-center z-50 pointer-events-none bg-white/40 backdrop-blur-sm">
                    <span className={`text-[12rem] drop-shadow-2xl font-bold ${feedback === '⭕️' ? 'text-sage' : 'text-terracotta'} animate-pop-in`}>
                      {feedback}
                    </span>
                  </div>
                )}
              </div>
            </div>
          )}

          {gameState === 'RESULT' && (
            <div className="w-full h-full flex flex-col p-4 sm:p-8 relative">
              <div className="w-full max-w-xl mx-auto flex-1 flex flex-col items-center justify-center bg-paper rounded-sm shadow-xl p-6 relative animate-open-note border border-white">
                <div className="pin pin-blue"></div>
                
                <h2 className="font-rounded text-3xl sm:text-4xl font-bold mb-6 text-bluegrey border-b-2 border-sage pb-2 mt-4">
                  けっか はっぴょう
                </h2>
                
                <p className="text-[6rem] sm:text-[8rem] font-bold text-terracotta mb-4 leading-none drop-shadow-sm">
                  {score} <span className="text-2xl sm:text-4xl text-bluegrey">てん</span>

                <p className="font-rounded text-lg sm:text-xl mb-12 text-sage font-bold bg-white px-6 py-2 rounded-full shadow-sm">
